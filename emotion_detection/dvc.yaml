stages:
  data_ingestion:
    cmd: python src\data\data_ingestion.py
    deps:
    - src\data\data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data\raw
  data_preprocessing:
    cmd: python src/data/data_preprocessing.py
    deps:
    - data/raw
    - src/data/data_preprocessing.py
    outs:
    - data/interim
  data_features:
    cmd: python src/features/data_features.py
    deps:
    - data/interim
    - src/features/data_features.py
    params:
    - data_features.max_features
    outs:
    - data/processed
  model_building:
    cmd: python src/model/model_building.py
    deps:
    - data/processed
    - src/model/model_building.py
    params:
    - model_building.n_estimators
    - model_building.max_samples
    outs:
    - models/model.pkl
  model_evalution:
    cmd: python src/model/model_evalution.py
    deps:
    - models/model.pkl
    - src/model/model_evalution.py
    metrics:
    - reports/metrics.json
