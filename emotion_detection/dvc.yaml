stages:
  data_ingestion:
    cmd: python src\data_ingestion.py
    deps:
    - src\data_ingestion.py
    params:
    - data_ingestion.test_size
    outs:
    - data\raw
  data_preprocessing:
    cmd: python src/data_preprocessing.py
    deps:
    - data/raw
    - src/data_preprocessing.py
    outs:
    - data/processedA
  data_features:
    cmd: python src/data_features.py
    deps:
    - data/processed
    - src/data_features.py
    params:
    - data_features.max_features
    outs:
    - data/transformed
  model_building:
    cmd: python src/model_building.py
    deps:
    - data/transformed
    - src/model_building.py
    params:
    - model_building.n_estimators
    - model_building.max_samples
    outs:
    - model.pkl
  model_evalution:
    cmd: python src/model_evalution.py
    deps:
    - model.pkl
    - src/model_evalution.py
    metrics:
    - metrics.json
